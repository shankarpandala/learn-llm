<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="14" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
  </defs>
  <!-- Brain/neural network icon -->
  <!-- Central node -->
  <circle cx="32" cy="28" r="3.5" fill="white"/>
  <!-- Top nodes -->
  <circle cx="22" cy="18" r="2.5" fill="white"/>
  <circle cx="42" cy="18" r="2.5" fill="white"/>
  <!-- Middle nodes -->
  <circle cx="18" cy="32" r="2.5" fill="white"/>
  <circle cx="46" cy="32" r="2.5" fill="white"/>
  <!-- Bottom nodes -->
  <circle cx="22" cy="42" r="2.5" fill="white"/>
  <circle cx="32" cy="46" r="2.5" fill="white"/>
  <circle cx="42" cy="42" r="2.5" fill="white"/>
  <!-- Connections from center -->
  <line x1="32" y1="28" x2="22" y2="18" stroke="white" stroke-width="1.2" opacity="0.7"/>
  <line x1="32" y1="28" x2="42" y2="18" stroke="white" stroke-width="1.2" opacity="0.7"/>
  <line x1="32" y1="28" x2="18" y2="32" stroke="white" stroke-width="1.2" opacity="0.7"/>
  <line x1="32" y1="28" x2="46" y2="32" stroke="white" stroke-width="1.2" opacity="0.7"/>
  <line x1="32" y1="28" x2="22" y2="42" stroke="white" stroke-width="1.2" opacity="0.7"/>
  <line x1="32" y1="28" x2="32" y2="46" stroke="white" stroke-width="1.2" opacity="0.7"/>
  <line x1="32" y1="28" x2="42" y2="42" stroke="white" stroke-width="1.2" opacity="0.7"/>
  <!-- Cross connections -->
  <line x1="22" y1="18" x2="18" y2="32" stroke="white" stroke-width="0.8" opacity="0.4"/>
  <line x1="42" y1="18" x2="46" y2="32" stroke="white" stroke-width="0.8" opacity="0.4"/>
  <line x1="18" y1="32" x2="22" y2="42" stroke="white" stroke-width="0.8" opacity="0.4"/>
  <line x1="46" y1="32" x2="42" y2="42" stroke="white" stroke-width="0.8" opacity="0.4"/>
  <line x1="22" y1="42" x2="32" y2="46" stroke="white" stroke-width="0.8" opacity="0.4"/>
  <line x1="42" y1="42" x2="32" y2="46" stroke="white" stroke-width="0.8" opacity="0.4"/>
  <line x1="22" y1="18" x2="42" y2="18" stroke="white" stroke-width="0.8" opacity="0.4"/>
</svg>
